<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://cdn.staticfile.org/twitter-bootstrap/5.1.1/css/bootstrap.min.css">
    <script defer 
        src="https://cdn.staticfile.org/twitter-bootstrap/5.1.1/js/bootstrap.bundle.min.js">
    </script>
    <script defer src="./script/login&signup.js"></script>
    <title>用户登录与注册</title>
</head>
<body>
    <main class="container">
        <div class="row">
            <div class="col-6 text-center"></div>
            <div class="col-6 py-5">
                <div id="webUI" class="border rounded">
                    <ul class="nav nav-tabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="loginTab-tab" 
                                data-bs-toggle="tab" data-bs-target="#loginTab" 
                                aria-controls="loginTab" aria-selected="true">
                                用户登录
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="signupTab-tab"
                                data-bs-toggle="tab" data-bs-target="#signupTab"
                                aria-controls="signupTab" aria-selected="false">
                                用户注册
                            </button>
                        </li>
                    </ul>
                    <div class="tab-content container p-1">
                        <div class="tab-pane fade show active" id="loginTab"
                                role="tabpanel" aria-labelledby="loginTab-tab">
                                <form class="p-3 m-0"
                                    method="post" action="http://example.com/api">
                                    <div class="mb-3">
                                        <label for="username" class="form-label">
                                            用户名：
                                        </label>
                                        <input type="text" class="form-control" id="username" name="username">
                                    </div>
                                    <div class="mb-3">
                                        <label for="password" class="form-label">
                                            密码：
                                        </label>
                                        <input type="password" class="form-control" id="password" name="password">
                                    </div>
                                    <div class="mb-3">
                                        <button type="submit" class="btn btn-primary">
                                            登录
                                        </button>
                                        <button type="reset" class="btn btn-danger">
                                            重置
                                        </button>
                                    </div>
                                </form>                 
                        </div>
                        <div class="tab-pane fade" id="signupTab" role="tabpanel"
                            aria-labelledby="signupTab-tab">
                            <form class="p-3 m-0"
                                method="post" action="http://example.com/api">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        请输入用户名：
                                    </label>
                                    <input type="text" class="form-control" id="username" name="username">
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        请设置您的密码：
                                    </label>
                                    <input type="password" class="form-control" id="password" name="password">
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        请确认您的密码：
                                    </label>
                                    <input type="password" class="form-control" id="password" name="password">
                                </div>
                                <div class="mb-3">
                                    <button type="submit" class="btn btn-primary">注册</button>
                                    <button type="reset" class="btn btn-danger">重置</button>
                                </div>
                            </form>
                    </div>
                </div>
            </div>
    </main>
</body>
</html>

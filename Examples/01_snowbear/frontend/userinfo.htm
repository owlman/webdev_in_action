<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 引入Bootstrap框架的CSS样式文件 -->
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <!-- 引入Bootstrap框架需要加载的脚本文件 -->       
    <script defer src="./node_modules/@popperjs/core/dist/umd/popper.min.js"></script>
    <script defer src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <!-- 引入FontAwesome图标库定义的样式文件 -->
    <link rel="stylesheet" 
        href="https://use.fontawesome.com/releases/v5.11.2/css/all.css">
    <!-- 引入自定义的CSS样式文件 -->
    <link rel="stylesheet" href="styles/custom.css">
    <!-- 引入blueimp-md5库的JavaScript脚本文件 -->
    <script src="./node_modules/blueimp-md5/js/md5.min.js"></script>
    <!-- 引入自定义的JavaScript脚本文件 -->
    <script type="module" src="./scripts/userInfo.js"></script>
    <script type="module" src="scripts/orderManage.js"></script>
    <title>用户个人信息管理</title>
</head>
<body>
    <!-- 导航栏区域开始-->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-text">
        <div class="container-fluid p-2">
            <a class="navbar-brand" href="#">
                <img src="./img/logo.png"  width="60" class="d-inline-block">
                <span class="fs-4">凌雪冰熊</span>
            </a>
            <button class="navbar-toggler" type="button"  data-bs-toggle="collapse" 
                data-bs-target="#navbarSupportedContent" 
                aria-controls="navbarSupportedContent" aria-expanded="false" 
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 fs-5">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.htm">
                            首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./news.htm">新闻活动</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./show.htm">产品展示</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./join.htm">申请加盟</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle"
                            href="#" id="navbarDropdown" 
                            role="button" data-bs-toggle="dropdown" 
                            aria-expanded="false">
                            更多信息
                        </a>
                        <ul id="dropdown-menu" 
                            class="dropdown-menu" 
                            aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">企业文化</a></li>
                            <li><a class="dropdown-item" href="#">企业荣誉</a></li>
                            <li><a class="dropdown-item" href="#">企业历程</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control" type="search" 
                        placeholder="搜索关键字" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">
                        <i class="fa fa-search fa-lg"></i>
                    </button>
                </form>
            </div>
        </div>
    </nav>
    <!-- 导航栏区域结束 -->
    <!-- 主体区域开始 -->
    <main class="container-fluid p-5">
        <!-- 在此处填充网页的主体内容 -->
        <header class="text-light row">
            <h1 class="col-8">个人信息管理</h1>
            <p class="col-4 text-end">
                欢迎回来，<span id="nickname"></span>！
            </p>
        </header>
        <section class="my-3 p-3 text-bg-light">
            <div class="d-flex align-items-start">
                <div class="nav flex-column nav-pills me-3 text-nowrap"
                    id="v-pills-tab" role="tablist" 
                    aria-orientation="vertical">
                    <button class="nav-link active" 
                            id="v-pills-baseinfo-tab" 
                            data-bs-toggle="pill" 
                            data-bs-target="#v-pills-baseinfo" 
                            type="button" role="tab"
                            aria-controls="v-pills-baseinfo" 
                            aria-selected="true">
                            基本信息
                    </button>
                    <button class="nav-link" 
                            id="v-pills-password-tab" 
                            data-bs-toggle="pill" 
                            data-bs-target="#v-pills-password" 
                            type="button" role="tab" 
                            aria-controls="v-pills-password" 
                            aria-selected="false">
                        修改密码
                    </button>
                    <button class="nav-link" 
                            id="v-pills-deleteuser-tab" 
                            data-bs-toggle="pill" 
                            data-bs-target="#v-pills-deleteuser" 
                            type="button" role="tab" 
                            aria-controls="v-pills-deleteuser" 
                            aria-selected="false">
                            注销账户
                    </button>
                    <button class="nav-link" 
                            id="v-pills-order-tab" 
                            data-bs-toggle="pill" 
                            data-bs-target="#v-pills-order" 
                            type="button" role="tab" 
                            aria-controls="v-pills-order" 
                            aria-selected="false">
                            线上点餐
                    </button>
                </div>
                <div class="tab-content" id="v-pills-tabContent">
                    <div class="tab-pane fade container-fluid show active" 
                        id="v-pills-baseinfo" role="tabpanel" 
                        aria-labelledby="v-pills-baseinfo-tab">
                        <form id="baseinfoForm">
                            <div class="p-2 row border border-2 rounded-2">
                                <div class="col-9">
                                    <div class="mb-3 row">
                                        <label for="username" class="col-form-label-sm col-3">
                                            你的昵称：
                                        </label>
                                        <div class="col-9">
                                            <input type="text" name="username"
                                                autocomplete="on" class="form-control" 
                                            />
                                            <div id="checkname"></div>
                                        </div>
                                    </div>
                                    <div class="mb-3 row">
                                        <label for="phone" class="col-form-label-sm col-3">
                                            手机号码：
                                        </label>
                                        <div class="col-9">
                                            <input type="text" name="phone"
                                                autocomplete="on" class="form-control"
                                            />
                                            <div id="checkphone"></div>
                                        </div>    
                                    </div>
                                    <div class="mb-3 row">
                                        <label for="phone" class="col-form-label-sm col-3">
                                            电子邮件：
                                        </label>
                                        <div class="col-9">
                                            <input type="text" name="email"
                                                autocomplete="on" class="form-control" 
                                            />
                                            <div id="checkemail"></div>
                                        </div>    
                                    </div>
                                    <div class="mb-3 row">
                                        <label for="address" class="col-form-label-sm col-3">
                                            收货地址：
                                        </label>
                                        <div class="col-9">
                                            <input type="text" name="address"
                                                autocomplete="on" class="form-control" 
                                            />
                                            <div id="checkaddress"></div>
                                        </div>    
                                    </div>
                                </div>
                                <div class="col-3 text-center">
                                    <img class="rounded-circle" name="outputAvatar"
                                        width="100" src="./img/unknown.jpg">
                                    <label class="m-2">
                                        <input type="file" name="avatar" 
                                            style="display: none;"
                                        />
                                        <input type="button" name="uploadAvatar" 
                                            class="btn btn-outline-secondary btn-sm"
                                            value="上传头像"
                                            onclick="document.querySelector('#baseinfoForm').avatar.click()"
                                         /> 
                                    </label>
                                    <input type="submit" value="更新信息" 
                                        class="btn btn-primary btn-sm" />
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="tab-pane fade container-fluid" id="v-pills-password"
                        role="tabpanel" aria-labelledby="v-pills-password-tab">
                        <form id="passwordForm">
                            <div class="p-2 row border border-2 rounded-2">
                                <div class="col-9">
                                    <div class="mb-3 row">
                                        <label for="oldPassword" 
                                            class="col-form-label-sm col-4">
                                            请输入你的旧密码：
                                        </label>
                                        <div class="col-8">
                                            <input name="oldPassword"
                                                autocomplete="new-password"    
                                                type="password" class="form-control"
                                            />
                                            <div id="checkoldPassword"></div>
                                        </div>
                                    </div>
                                    <div class="mb-3 row">
                                        <label for="newPassword" 
                                            class="col-form-label-sm col-4">
                                            请输入你的新密码：
                                        </label>
                                        <div class="col-8">
                                            <input name="newPassword"
                                                autocomplete="new-password"    
                                                type="password" class="form-control"  
                                            />
                                            <div id="checknewPassword"></div>
                                        </div>
                                    </div>
                                    <div class="mb-3 row">
                                        <label for="confirmPassword" 
                                            class="col-form-label-sm col-4">
                                            请确认你的新密码：
                                        </label>
                                        <div class="col-8">
                                            <input name="confirmPassword"
                                                autocomplete="new-password"
                                                type="password" class="form-control"  
                                            />
                                            <div id="checkconfirmPassword"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-3 row">
                                    <p class="text-danger fs-6 mb-4">
                                        警告：该操作可能会导致你无法再登录到本网站。
                                    </p>
                                    <input type="submit" value="确认更新密码" 
                                        class="btn btn-primary btn-sm" 
                                    />
                                </div>
                            </div>
                        </form>
                    </div> 
                    <div class="tab-pane fade container-fluid"
                        id="v-pills-deleteuser" role="tabpanel" 
                        aria-labelledby="v-pills-deleteuser-tab">
                        <form id="deleteForm">
                            <div class="p-2 row border border-2 rounded-2">
                                <div class="col-12 px-4">
                                     <p class="text-danger fs-4 mb-4">
                                        警告：在注销用户之后，你将无法再登录到本网站。
                                    </p>
                                    <div class="mb-3 row col-12">
                                        <label for="password" 
                                            class="col-form-label-sm col-4">
                                            请输入你的密码：
                                        </label>
                                        <div class="col-5">
                                            <input type="password" name="password"
                                                autocomplete="off" class="form-control"  
                                            />
                                            <div id="checkPassword"></div>
                                        </div>
                                        <input type="submit" value="确认注销" 
                                            class="btn btn-danger btn-sm col-3"
                                        />
                                    </div>
                                </div>    
                            </div>
                        </form>
                    </div>
                    <div class="tab-pane fade container-fluid"
                        id="v-pills-order" role="tabpanel" 
                        aria-labelledby="v-pills-order-tab">
                        <header class="p-3 row">
                            <h4 class="col-10">所有订单 </h3>
                            <div class="col-2 text-end">
                                <!-- Button trigger modal -->
                                <button type="button" class="btn btn-primary btn-sm"   
                                    data-bs-toggle="modal" data-bs-target="#addorder">
                                    我要点饮料
                                </button>
                                <!-- Modal -->
                                <div class="modal fade" id="addorder" tabindex="-1"
                                    aria-labelledby="addorderLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title" id="addorderLabel">
                                                请选择饮料，并下单！
                                            </h5>
                                            <button type="button" class="btn-close"
                                                data-bs-dismiss="modal" aria-label="Close">
                                            </button>
                                        </div>
                                        <div class="modal-body" >
                                            <form id="orderForm" class="p-2">
                                                <div id="drinkList"></div>
                                            </form>
                                        </div>
                                        <script id="drinklistTpl" type="text/html">
                                            <div class="row g-3">
                                                <div class="col-auto">
                                                    <select class="form-select"
                                                        name="drink">
                                                        <option selected">
                                                            请选择饮料
                                                        </option>
                                                        {{ each menuList }}
                                                        <option value="{{ $value.price  }}">
                                                            {{ $value.name }}
                                                        </option>
                                                        {{ /each }}
                                                    </select>
                                                </div>
                                                <div class="col-auto">
                                                    <select class="form-select" 
                                                        name="size">
                                                        <option selected>
                                                            请选择尺寸
                                                        </option>
                                                        <option value="2">
                                                            大杯
                                                        </option>
                                                        <option value="1">
                                                            中杯
                                                        </option>
                                                        <option value="0">
                                                            小杯
                                                        </option>
                                                    </select>
                                                </div>
                                                <div class="col-auto">
                                                    <select class="form-select" 
                                                        name="heatlevel">
                                                        <option selected>
                                                            请选择温度
                                                        </option>
                                                        <option value="2">
                                                            热饮
                                                        </option>
                                                        <option value="0">
                                                            常温
                                                        </option>
                                                        <option value="1">
                                                            少冰
                                                        </option>
                                                        <option value="2">
                                                            正常冰
                                                        </option>
                                                    </select>
                                                </div>
                                            </div>
                                        </script>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" 
                                                data-bs-dismiss="modal">
                                                不想买了
                                            </button>
                                            <button type="button" class="btn btn-primary"
                                                id="addorder">
                                                确认下单，去支付
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </header>
                        <article id="orderlist" class="container">
                        </article>                        
                        <script id="ordertemplate" type="text/html">
                            <table id="ordertable" class="table table-striped table-hover">
                                <tr>
                                    <th>订单号</th>
                                    <th>订单内容</th>
                                    <th>订单日期</th>
                                    <th>订单价格</th>
                                    <th>可执行的操作</th>
                                </tr>
                                {{ each orderlist }}
                                <tr>
                                    <td> {{ $value.number }} </td>
                                    <td> {{ $value.message }} </td>
                                    <td> {{ $value.date }} </td>
                                    <td> ￥{{ $value.price }} </td>
                                    <td>
                                        <button type="button" 
                                            class="showDetail btn btn-primary btn-sm"
                                            order-number="{{ $value.number }}">
                                            查看详情
                                        </button>
                                        <button type="button" 
                                            class="deleteOrder btn btn-danger btn-sm"
                                            order-number="{{ $value.number }}">
                                            删除订单
                                        </button>
                                    </td>
                                </tr>
                                {{ /each }}
                            </table>
                        </script>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- 主体区域结束 -->
    <!-- 页脚区域开始 -->
    <footer class="p-3 text-light">
        <section id="contact" class="container">
            <h4>联系我们：</h4>
            <div class="row m-3">
                <!-- 使用 <i> 标记的 class 属性插入来自第三方库的图标 -->
                <ul class="list-unstyled col-5">
                    <li><i class="fa fa-phone"></i> 123-456-7890</li>
                    <li><i class="fa fa-envelope"></i> message@snowbear.com</li>
                    <li><i class="fa fa-map-marker"></i> 上海市浦东新区某某路X号</li>
                </ul>
                <ul class="list-unstyled col-4">
                    <li><i class="fab fa-twitter"></i> @SnowBear</li>
                    <li><i class="fab fa-weibo"></i> @SnowBear</li>
                    <li><i class="fab fa-facebook-f"></i> 凌雪冰熊官方主页</li>
                </ul>
                <div class="col-3 text-center">
                    <i class="fab fa-weixin fa-3x"></i>
                    <p>关注凌雪冰熊公众号</p>
                </div>
            </div>
        </section>
        <section class="container text-center m-3 ">
            <hr>
            <span>&copy; 2023 凌雪冰熊有限公司</span>
        </section>
    </footer>
    <!-- 页脚区域开始 -->
</body>
</html>
